services:
  mongodb:
    image: mongo:latest
    container_name: urbancanvas-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: urbancanvas-app
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://admin:secretpassword@mongodb:27017
    command: tail -f /dev/null
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./urbancanvas
    container_name: urbancanvas-frontend
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://admin:secretpassword@mongodb:27017
    ports:
      - "3010:3010"
    volumes:
      - ./urbancanvas:/app
      - /app/node_modules

volumes:
  mongodb_data:

