version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: urbancanvas-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secretpassword
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: urbancanvas-app
    depends_on:
      - mongodb
    environment:
      # Вказуємо контейнеру підключатися до БД по імені сервісу 'mongodb', а не 'localhost'
      MONGO_URL: mongodb://admin:secretpassword@mongodb:27017
    # Контейнер просто висітиме у фоні, щоб ми могли заходити в нього і запускати скрипти
    command: tail -f /dev/null

volumes:
  mongodb_data:
